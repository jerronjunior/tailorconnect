name: tailorconnect
description: "TailorConnect - Custom Clothing Made Easy. Connects customers with professional tailors."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  firebase_messaging: ^15.2.0
  firebase_analytics: ^11.4.0
  firebase_crashlytics: ^4.3.0
  # Auth Providers
  google_sign_in: ^6.2.1

  # UI
  cached_network_image: ^3.3.1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.1

  # Local Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  uuid: ^4.4.2
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
